[project]
name = "arma3-offline-map-lib"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
authors = [
    { name = "recreational-projects", email = "205627218+recreational-projects@users.noreply.github.com" }
]
urls = { "source" = "https://github.com/recreational-projects/arma3-offline-map-lib" }
requires-python = ">=3.11"
dependencies = [
    "numpy>=2.4.4",
]

[build-system]
requires = ["uv_build>=0.11.3,<0.12.0"]
build-backend = "uv_build"

[dependency-groups]
dev = [
    "pdoc>=16.0.0",
    "ruff>=0.15.9",
]

[tool.ruff.lint]
select = ["ALL"]

ignore = [
    "COM812", # missing-trailing-comma: conflicts with formatter
]

[tool.ruff.lint.pydocstyle]
convention = "google"
